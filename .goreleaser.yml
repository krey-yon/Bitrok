version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: bitrok
    main: ./cli/cmd/bitrok
    binary: bitrok
    ldflags:
      - -s -w -X github.com/bitrok/bitrok/cli/internal/cli.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

  - id: bitrok-server
    main: ./server/cmd/bitrok-server
    binary: bitrok-server
    ldflags:
      - -s -w -X github.com/bitrok/bitrok/server/internal/api.Version={{.Version}}
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: bitrok
    ids: [bitrok]
    formats: [tar.gz]
    name_template: "bitrok_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
  - id: bitrok-server
    ids: [bitrok-server]
    formats: [tar.gz]
    name_template: "bitrok-server_{{ .Os }}_{{ .Arch }}"

homebrew_casks:
  - name: bitrok
    ids: [bitrok]
    repository:
      owner: krey-yon
      name: homebrew-bitrok
    homepage: "https://github.com/krey-yon/Bitrok"
    description: "Deterministic self-hosted tunnels CLI"
    binaries: [bitrok]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
