name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: test -z "$(gofmt -l cli pkg server)"
      - name: Vet
        run: go vet ./...
      - name: Test with race detector
        run: go test -race ./...
      - name: Build release targets
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build ./server/cmd/bitrok-server
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build ./cli/cmd/bitrok
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build ./cli/cmd/bitrok
      - name: Scan Go dependencies
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  web:
    name: Web verification
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      DATABASE_URL: postgresql://bitrok:bitrok@127.0.0.1:5432/bitrok
      BETTER_AUTH_SECRET: ci-only-better-auth-secret-32-bytes
      BETTER_AUTH_URL: http://localhost:3000
      GITHUB_CLIENT_ID: ci-client-id
      GITHUB_CLIENT_SECRET: ci-client-secret
      BITROK_JWT_SECRET: ci-only-relay-jwt-secret-at-least-32-bytes
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm test
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
