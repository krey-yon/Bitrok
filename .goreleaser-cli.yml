version: 2

builds:
  - id: bitrok
    main: ./cli/cmd/bitrok
    binary: bitrok
    ldflags:
      - -s -w -X github.com/bitrok/bitrok/cli/internal/cli.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: bitrok
    ids: [bitrok]
    formats: [tar.gz]
    name_template: "bitrok_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
